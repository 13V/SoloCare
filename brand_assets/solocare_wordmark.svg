      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;display=swap');
      .text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 132px;
        font-weight: 600;
        letter-spacing: 2px;
      }
